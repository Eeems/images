services:
  rnsd:
    image: eeems/reticulum:latest
    networks: [reticulum]
    ports:
      - target: 4242
        published: 4242
        protocol: tcp
        mode: host
      - target: 29716
        published: 29716
        protocol: udp
        mode: host
      - target: 42671
        published: 42671
        protocol: udp
        mode: host
    volumes:
      - rnsd:/config

  lxmd:
    image: eeems/reticulum:lxmd
    networks: [reticulum]
    depends_on: [rnsd]
    volumes:
      - lxmd:/config

  echobot:
    image: eeems/reticulum:echobot
    networks: [reticulum]
    depends_on: [rnsd]
    volumes:
      - echobot:/config

  nomadnet:
    image: eeems/reticulum:nomadnet
    networks: [reticulum]
    depends_on: [rnsd]
    volumes:
      - nomadnet:/config

  rrcd:
    image: eeems/reticulum:rrcd
    networks: [reticulum]
    depends_on: [rnsd]
    volumes:
      - rrcd:/config

volumes:
  rnsd:
  lxmd:
  echobot:
  nomadnet:
  rrcd:
networks:
  reticulum:
